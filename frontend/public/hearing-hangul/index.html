<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>hearing-한글</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <button class="stats-btn" id="stats-btn" title="Your stats" aria-label="Your stats">📊</button>

    <header>
      <h1><span class="leaf">🍃</span> hearing-한글</h1>
      <p class="sub">Hear the sound. Type the letter. No romanization.</p>
    </header>

    <div id="ime-warning" class="ime">
      Looks like your system <b>Korean keyboard</b> is on. Switch your input back to
      <b>English / ABC</b> so the app can read your keystrokes. (The on-screen keyboard
      always works.)
    </div>

    <div class="modes">
      <button class="mode-btn active" data-mode="vowels">Vowels</button>
      <button class="mode-btn" data-mode="syllables">Syllables</button>
    </div>

    <div class="score" id="score">0 / 0</div>

    <div class="speaker">
      <button class="play" id="play" title="Play sound">🔊</button>
      <div class="bubble hidden" id="bubble" aria-live="polite"></div>
    </div>
    <p class="prompt" id="prompt">Listen, then type the vowel you hear</p>

    <div class="display" id="display"></div>
    <div class="hint" id="hint"></div>

    <div class="keyboard" id="keyboard"></div>

    <div class="feedback hidden" id="feedback"></div>

    <div class="modal hidden" id="stats-modal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-label="Your stats">
        <button class="modal-close" id="stats-close" aria-label="Close">✕</button>
        <h2 class="modal-title">📊 Your Stats</h2>
        <div class="stats-summary" id="stats-summary"></div>
        <div class="stats-body" id="stats-body"></div>
        <button class="stats-reset" id="stats-reset">Reset stats</button>
      </div>
    </div>
  </main>

  <script src="hangul.js"></script>
  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
